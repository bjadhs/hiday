<svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Hiday">
  <title>Hiday</title>
  <defs>
    <linearGradient id="hiday-badge" x1="2" y1="2" x2="35" y2="35" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6D28D9"/>
      <stop offset="1" stop-color="#9D6FE6"/>
    </linearGradient>
    <linearGradient id="hiday-sun" x1="11.5" y1="13" x2="25.5" y2="27" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FDE68A"/>
      <stop offset="0.55" stop-color="#FBBF24"/>
      <stop offset="1" stop-color="#F97316"/>
    </linearGradient>
    <clipPath id="hiday-clip-fav">
      <rect x="2" y="2" width="33" height="33" rx="9"/>
    </clipPath>
  </defs>

  <!-- badge (no offset shadow / rays — keeps the mark bold and clean at small sizes) -->
  <rect x="2" y="2" width="33" height="33" rx="9" fill="url(#hiday-badge)" stroke="#1A1A1E" stroke-width="2.5"/>

  <g clip-path="url(#hiday-clip-fav)">
    <!-- rising sun -->
    <circle cx="18.5" cy="19.5" r="7.5" fill="url(#hiday-sun)"/>

    <!-- ground -->
    <rect x="-2" y="22.5" width="41" height="15" fill="#5B21B6" opacity="0.6"/>

    <!-- horizon line -->
    <rect x="-2" y="21.5" width="41" height="2" fill="#FFFFFF" opacity="0.9"/>
  </g>
</svg>
