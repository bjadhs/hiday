<svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Hiday">
  <title>Hiday</title>
  <defs>
    <linearGradient id="hiday-badge" x1="2" y1="2" x2="35" y2="35" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6D28D9"/>
      <stop offset="1" stop-color="#9D6FE6"/>
    </linearGradient>
    <linearGradient id="hiday-sun" x1="11.5" y1="13" x2="25.5" y2="27" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FDE68A"/>
      <stop offset="0.55" stop-color="#FBBF24"/>
      <stop offset="1" stop-color="#F97316"/>
    </linearGradient>
    <clipPath id="hiday-clip">
      <rect x="2" y="2" width="33" height="33" rx="9"/>
    </clipPath>
  </defs>

  <!-- hard offset "brutal" shadow -->
  <rect x="5" y="5" width="33" height="33" rx="9" fill="#1A1A1E"/>

  <!-- badge -->
  <rect x="2" y="2" width="33" height="33" rx="9" fill="url(#hiday-badge)" stroke="#1A1A1E" stroke-width="2"/>

  <g clip-path="url(#hiday-clip)">
    <!-- sun rays -->
    <g stroke="#FDE68A" stroke-width="2" stroke-linecap="round">
      <line x1="18.5" y1="8" x2="18.5" y2="10.5"/>
      <line x1="10.6" y1="11.4" x2="12.7" y2="13.2"/>
      <line x1="26.4" y1="11.4" x2="24.3" y2="13.2"/>
    </g>

    <!-- rising sun -->
    <circle cx="18.5" cy="19.5" r="7" fill="url(#hiday-sun)"/>

    <!-- ground -->
    <rect x="-2" y="22" width="41" height="15" fill="#5B21B6" opacity="0.55"/>

    <!-- horizon line -->
    <rect x="-2" y="21.25" width="41" height="1.5" fill="#FFFFFF" opacity="0.85"/>
  </g>
</svg>
